name: uit-buddy-backend

services:
  redis:
    image: docker.io/library/redis:8-alpine
    container_name: buddy-redis
    # restart: always
    networks:
      - buddy-net
    ports:
      - ${HOST_REDIS_PORT}:6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/uit-buddy/backend:${IMAGE_TAG:-latest}
    container_name: uit-buddy-backend
    restart: always
    networks:
      - buddy-net
    ports:
      - ${HOST_SERVER_PORT}:8080
    env_file:
      - backend.env
    volumes:
      - ./uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:/app/uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${RDS_ENDPOINT}/${POSTGRES_DB}?connectTimeout=3
      - DEV_REDIS_HOST=buddy-redis
      - DEV_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy

  pgadmin:
    image: docker.io/dpage/pgadmin4:latest
    container_name: buddy-pgadmin
    restart: always
    networks:
      - buddy-net
    ports:
      - ${HOST_PGADMIN_PORT:-5050}:80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgadmin_data:
  redis_data:

networks:
  buddy-net:
    driver: bridge
