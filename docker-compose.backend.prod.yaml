name: uit-buddy-backend

services:
  backend:
    image: ghcr.io/uit-buddy/backend:latest
    container_name: buddy-backend
    networks:
      - default
      - uit_buddy_shared_network
    restart: always
    env_file:
      - backend.env
    volumes:
      - ./uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:/app/uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:ro
    environment:
      - DEV_DATABASE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - DEV_REDIS_HOST=redis
      - DEV_REDIS_PORT=6379
    ports:
      - "${HOST_SERVER_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: buddy-postgres
    networks:
      - default
      - uit_buddy_shared_network
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: buddy-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  uit_buddy_shared_network:
