name: uit-buddy-backend

services:
  redis:
    image: docker.io/library/redis:8-alpine
    container_name: buddy-redis
    restart: always
    ports:
      - ${HOST_REDIS_PORT}:6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ghcr.io/uit-buddy/backend:latest
    container_name: uit-buddy-backend
    restart: always
    ports:
      - ${HOST_SERVER_PORT}:8000
    env_file:
      - backend.env
    volumes:
      - ./uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:/app/uit-buddy-firebase-adminsdk-fbsvc-e3e18ce04a.json:ro
    environment:
      - DEV_DATABASE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - DEV_REDIS_HOST=redis
      - DEV_REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: buddy-postgres
    networks:
      - uit_buddy_shared_network
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  uit_buddy_shared_network:
